        <div class="table-responsive" id="RenderReporti">
           <table class="table" style="min-width: 100%;" >
            <thead>
              <tr  >
                <th class="text-left" >Registered</th>
                <th class="text-left" >Today</th>
                <th class="text-left" >This Week</th>
                <th class="text-left" >This Month</th>
                <th class="text-left" >Total</th>
              </tr>
            </thead>
            <tbody id="RenderReport" >

            </tbody>
           </table>
        </div>

        <p class="mt-3 text-right" >
          <button class="btn btn-sm btn-primary" onclick="loadData()" >
              reload
          </button>
        </p>



</div>

<script>
    $(document).ready(function(){
      loadData()
      
    })

    function loadData(){
      $('#loadMe').modal('show')
       const leo = moment().startOf('day').format('YYYY-MM-DD'),
            wk = moment().startOf('isoWeek').format('YYYY-MM-DD'),
            mth = moment().startOf('month').format('YYYY-MM-DD'),
            data = {
               data:{mth} ,
               url:'/staffonly/loadReport'
            },
            sendit = POSTREQUEST(data)

            sendit.then(resp=>{

            

              const tdyDt = resp.dta.filter(c=>moment(c.created).format()===moment(leo).format()),
                    wkdt = resp.dta.filter(c=>moment(c.created).format()>=moment(wk).format()),
                    mthdt = resp.dta.filter(c=>moment(c.created).format()>=moment(mth).format()),
                    dta = `
                      
                      <tr>
                        <td scope="row">Users</td>
                        <td>${tdyDt.filter(e=>!e.Interprise)?.length}</td>
                        <td>${wkdt.filter(e=>!e.Interprise)?.length}</td>
                        <td>${mthdt.filter(e=>!e.Interprise)?.length}</td>
                        <td>${resp.users}</td>
                      </tr>
                      <tr>
                        <td scope="row">Enterprises</td>
                        <td>${tdyDt.filter(e=>e.Interprise)?.length}</td>
                        <td>${wkdt.filter(e=>e.Interprise)?.length}</td>
                        <td>${mthdt.filter(e=>e.Interprise)?.length}</td>
                        <td>${resp.totalEnt}</td>
                      </tr>
                    
                      ` 
                    $('#RenderReport').html(dta)
                    $('#loadMe').modal('hide')
                    hideLoading()

            })

         
    }
</script>
