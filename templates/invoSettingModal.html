
<!-- Modal -->
<div class="modal fade" id="IvoSettingModal" tabindex="-1" role="dialog" aria-labelledby="modelTitleId" aria-hidden="true">
    <div class="modal-dialog modal-sm" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">{% if useri.langSet == 0 %}Ukubwa wa risiti/ankara {% else %}Invoice Size{% endif %}</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
        </div>
        <div class="modal-body">
          <div class="print_option classic_div py-2 justify-content-center"  >
            <h6 class="text-center" >
             {% if useri.langSet == 0 %}Aina ya Risiti {% else %}Print Options{% endif %}
  
            </h6>
            <div class="d-flex justify-content-center mt-3">
                  <button id="print_mini" class="btn btn-light mr-2 receipt_options{% if cheo.mnRecipt %} text-primary bluebox {% endif %}" data-min="1" data-active="{% if cheo.mnRecipt %}1{% else %}0{% endif %}">
                       <svg xmlns="http://www.w3.org/2000/svg" height="38px" viewBox="0 -960 960 960" width="38px" fill="currentColor"><path d="M120-80v-800l60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60v800l-60-60-60 60-60-60-60 60-60-60-60 60-60-60-60 60-60-60-60 60-60-60-60 60Zm120-200h480v-80H240v80Zm0-160h480v-80H240v80Zm0-160h480v-80H240v80Zm-40 404h560v-568H200v568Zm0-568v568-568Z"/>
                       </svg> <br>
                        <small>{% if useri.langSet == 0 %}Risiti Ndogo {% else %}Min Invoice{% endif %}</small> 
                   </button>
  
                   <button class="btn btn-light receipt_options {% if not cheo.mnRecipt %}text-primary  bluebox {% endif %} " data-min="0">
                     <svg xmlns="http://www.w3.org/2000/svg" height="38px" viewBox="0 -960 960 960" width="38px" fill="currentColor"><path d="M240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h360l200 200v520q0 33-23.5 56.5T720-80H240Zm0-80h480v-480H560v-160H240v640Zm240-40q67 0 113.5-47T640-360v-160h-80v160q0 33-23 56.5T480-280q-33 0-56.5-23.5T400-360v-220q0-9 6-14.5t14-5.5q9 0 14.5 5.5T440-580v220h80v-220q0-42-29-71t-71-29q-42 0-71 29t-29 71v220q0 66 47 113t113 47ZM240-800v160-160 640-640Z"/></svg>
                     <br>
                     <small>{% if useri.langSet == 0 %}Risiti Kubwa {% else %}Paper Invoice{% endif %} </small> 
                   </button>                  
            </div>
         
         </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
</div>
